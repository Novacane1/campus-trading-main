services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-campus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-db-password}
      POSTGRES_DB: ${DB_NAME:-campus_trading}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-campus} -d ${DB_NAME:-campus_trading}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key}
      - DB_USER=${DB_USER:-campus}
      - DB_PASSWORD=${DB_PASSWORD:-change-me-db-password}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-campus_trading}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - PICUI_API_TOKEN=${PICUI_API_TOKEN:-}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_GATEWAY=${ALIPAY_GATEWAY:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - ALIPAY_APP_PUBLIC_KEY=${ALIPAY_APP_PUBLIC_KEY:-}
      - ALIPAY_APP_PRIVATE_KEY=${ALIPAY_APP_PRIVATE_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-}
      - ALIPAY_DEBUG=${ALIPAY_DEBUG:-true}
    volumes:
      - uploads:/app/static/uploads
      - ./backend/data/models:/app/data/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
